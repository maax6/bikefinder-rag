services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bikefinder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bikefinder}
      POSTGRES_DB: ${POSTGRES_DB:-bikefinder}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/bikefinder_rag/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bikefinder}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
